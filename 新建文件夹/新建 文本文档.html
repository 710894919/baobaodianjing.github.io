<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆爆电竞俱乐部 - 价格表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 20px;
            padding: 40px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        .logo {
            display: block;
            width: 160px;
            margin: 0 auto 20px;
            border-radius: 12px;
        }
        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .price-btn {
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: #0ea5e9;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .price-btn:hover {
            background: #0284c7;
            transform: translateY(-2px);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            max-width: 100%;
            max-height: 95vh;
        }
        .close {
            position: absolute;
            top: 20px; right: 20px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="card">
    <!-- 本地 LOGO -->
    <img class="logo" src="images/logo.png" alt="爆爆电竞">
    
    <h1 class="title">爆爆电竞俱乐部</h1>
    <p class="subtitle">点击查看价格表</p>

    <div class="button-group">
        <button class="price-btn" onclick="openImg('images/banban.png')">🧾 板板权益</button>
        <button class="price-btn" onclick="openImg('images/peiwan.png')">🎮 护航陪玩体验单</button>
        <button class="price-btn" onclick="openImg('images/quwei.png')">🎉 趣味单</button>
    </div>
</div>

<!-- 弹窗 -->
<div id="modal" class="modal">
    <div class="close" onclick="closeImg()">×</div>
    <img id="imgBox" class="modal-content" src="">
</div>

<script>
function openImg(url) {
    document.getElementById('imgBox').src = url;
    document.getElementById('modal').classList.add('show');
}
function closeImg() {
    document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').onclick = function(e) {
    if (e.target === this) closeImg();
}
</script>
</body>
</html>
