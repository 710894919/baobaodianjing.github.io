<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆爆电竞俱乐部</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page {
            width: 100%;
            display: none;
        }
        .page.active {
            display: block;
        }
        .card {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        .logo {
            display: block;
            width: 140px;
            margin: 0 auto 20px;
            border-radius: 12px;
        }
        .title {
            text-align: center;
            font-size: clamp(20px, 5vw, 26px);
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: clamp(14px, 3vw, 16px);
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .price-btn {
            padding: 20px 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #fff;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .price-btn:hover {
            transform: translateY(-2px);
        }
        .back-btn {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        /* 图片弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal.show {
            display: flex;
        }
        .modal img {
            max-width: 95%;
            max-height: 95vh;
            border-radius: 10px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- ====================== -->
<!-- 第 1 页：主页 -->
<!-- ====================== -->
<div id="page1" class="page active">
    <div class="card">
        <img class="logo" src="images/logo.png" alt="爆爆电竞">
        <h1 class="title">爆爆电竞俱乐部</h1>
        <p class="subtitle">点击查看服务</p>

        <div class="button-group">
            <button class="price-btn" onclick="goToBanban()">🧾 五一限时特惠单</button>
            <button class="price-btn" onclick="goToPeiwan()">🎮 护航陪玩体验单</button>
            <button class="price-btn" onclick="goToQuwei()">🎉 趣味单</button>
        </div>
    </div>
</div>

<!-- ====================== -->
<!-- 第 2 页：板板权益 -->
<!-- ====================== -->
<div id="page2" class="page">
    <div class="card">
        <img class="logo" src="images/logo.png" alt="爆爆电竞">
        <h1 class="title">板板权益中心</h1>
        <div class="button-group">
            <button class="price-btn" onclick="openImg('images/xianshi.png')">📜 五一限时活动</button>
            <button class="price-btn" onclick="openImg('images/wuyibakeshen.png')">🎁 五一巴克什趣味单</button>
            <button class="price-btn" onclick="openImg('images/wuyilaodong.png')">🛡️ 五一劳动趣味单</button>
            <button class="price-btn" onclick="openImg('images/wuyimenggongjie.png')">🛖猛攻节趣味单</button>
            <button class="price-btn back-btn" onclick="goBack()">🔙 返回主页</button>
        </div>
    </div>
</div>

<!-- ====================== -->
<!-- 第 3 页：护航陪玩 -->
<!-- ====================== -->
<div id="page3" class="page">
    <div class="card">
        <img class="logo" src="images/logo.png" alt="爆爆电竞">
        <h1 class="title">护航陪玩体验</h1>
        <div class="button-group">
            <button class="price-btn" onclick="openImg('images/peiwan1.png')">⭐ 体验单</button>
            <button class="price-btn" onclick="openImg('images/peiwan2.png')">🔥 大神护航</button>
            <button class="price-btn" onclick="openImg('images/peiwan.png')">💎 定制陪玩</button>
            <button class="price-btn back-btn" onclick="goBack()">🔙 返回主页</button>
        </div>
    </div>
</div>

<!-- ====================== -->
<!-- 第 4 页：趣味单 -->
<!-- ====================== -->
<div id="page4" class="page">
    <div class="card">
        <img class="logo" src="images/logo.png" alt="爆爆电竞">
        <h1 class="title">趣味单中心</h1>
        <div class="button-group">
            <button class="price-btn" onclick="openImg('images/jiaochunidejindan.png')">🎪交出你的金蛋</button>
            <button class="price-btn" onclick="openImg('images/dafuwengbaodi.png')">🎭大富翁保底版</button>
            <button class="price-btn back-btn" onclick="goBack()">🔙 返回主页</button>
        </div>
    </div>
</div>

<!-- 图片弹窗 -->
<div id="modal" class="modal">
    <div class="close" onclick="closeImg()">×</div>
    <img id="imgShow">
</div>

<script>
// 去板板权益
function goToBanban() {
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
}

// 去护航陪玩
function goToPeiwan() {
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page3").classList.add("active");
}

// 去趣味单
function goToQuwei() {
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page4").classList.add("active");
}

// 返回主页
function goBack() {
    document.getElementById("page2").classList.remove("active");
    document.getElementById("page3").classList.remove("active");
    document.getElementById("page4").classList.remove("active");
    document.getElementById("page1").classList.add("active");
}

// 图片弹窗
function openImg(url) {
    document.getElementById("imgShow").src = url;
    document.getElementById("modal").classList.add("show");
}
function closeImg() {
    document.getElementById("modal").classList.remove("show");
}
document.getElementById("modal").onclick = function(e){
    if(e.target == this) closeImg();
}
</script>

</body>
</html>
